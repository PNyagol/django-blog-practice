<style>
body {
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    color: #333;
    background: #f9fafb;
    margin: 0;
    padding: 1.5rem;
}
.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}
h1 {
    color: #0f3d70;
    margin-bottom: 0.8rem;
}
.post-meta {
    color: #6c757d;
    margin-bottom: 1.5rem;
    font-size: 0.95rem;
}
p {
    line-height: 1.75;
    margin-bottom: 1.2rem;
    white-space: pre-line;
}
a.back-link {
    display: inline-block;
    margin-bottom: 1rem;
    color: #1356d8;
    text-decoration: none;
}
a.back-link:hover {
    text-decoration: underline;
}
</style>

<div class="container">
    <a class="back-link" href="{% url 'blog:post_list' %}">&larr; Back to posts</a>
    <h1>{{ post.title }}</h1>
    <div class="post-meta">Published {{ post.created_at }}</div>
    <p>{{ post.content }}</p>
</div>
