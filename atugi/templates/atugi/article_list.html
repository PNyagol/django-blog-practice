<!DOCTYPE html>
<html>
<head>
    <title>Articles</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'atugi/css/style.css' %}">
</head>
<body>
    <h1>Articles</h1>
    <a href="{% url 'article_create' %}" class="btn">Create New Article</a>
    {% for article in articles %}
        <div class="article">
            <h2><a href="{% url 'article_detail' article.pk %}">{{ article.title }}</a></h2>
            <p>{{ article.created }}</p>
            <a href="{% url 'article_edit' article.pk %}" class="btn">Edit</a>
            <a href="{% url 'article_delete' article.pk %}" class="btn btn-danger">Delete</a>
        </div>
    {% endfor %}
</body>
</html>
