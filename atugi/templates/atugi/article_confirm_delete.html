<!DOCTYPE html>
<html>
<head>
    <title>Delete Article</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'atugi/css/style.css' %}">
</head>
<body>
    <h1>Delete Article</h1>
    <p>Are you sure you want to delete "{{ article.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
    </form>
    <a href="{% url 'article_detail' article.pk %}" class="btn">Cancel</a>
</body>
</html>
